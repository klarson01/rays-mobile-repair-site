[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[redirects]]
  from = "/_handoff/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.agents/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.codex/*"
  to = "/404.html"
  status = 404
  force = true
